<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClinicCare Settings</title>
    <link rel="stylesheet" href="assets/css/settings.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">CC</div>
          <div>
            <h1>ClinicCare</h1>
            <p>Clinical Management System</p>
          </div>
        </div>
        <nav class="nav-list">
          <a class="nav-item" href="dashboard.html">Dashboard</a>
          <a class="nav-item" href="patients.html">Patients</a>
          <a class="nav-item" href="appointments.html">Appointments</a>
          <a class="nav-item" href="doctors.html">Doctors</a>
          <a class="nav-item" href="departments.html">Departments</a>
          <a class="nav-item" href="records.html">Medical Records</a>
          <a class="nav-item" href="billing.html">Billing</a>
          <a class="nav-item" href="reports.html">Reports</a>
          <a class="nav-item active" href="settings.html">Settings</a>
          <a class="nav-item logout" href="login.html">Logout</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">System Configuration</p>
            <h2>Settings</h2>
          </div>
        </header>

        <section class="settings-grid">
          <div class="settings-panel">
            <h3>General Settings</h3>
            <div class="form-group">
              <label>Clinic Name</label>
              <input type="text" value="ClinicCare Hospital" />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" value="contact@cliniccare.com" />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" value="+1 (555) 123-4567" />
            </div>
            <div class="form-group">
              <label>Address</label>
              <textarea>123 Healthcare Ave, Medical City, ST 12345</textarea>
            </div>
          </div>

          <div class="settings-panel">
            <h3>Account Settings</h3>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" value="Dr. Sarah Wilson" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" value="sarah.wilson@cliniccare.com" />
            </div>
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" placeholder="••••••••" />
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" placeholder="••••••••" />
            </div>
          </div>

          <div class="settings-panel">
            <h3>Notification Settings</h3>
            <div class="toggle-group">
              <label>Email Notifications</label>
              <input type="checkbox" checked />
            </div>
            <div class="toggle-group">
              <label>SMS Alerts</label>
              <input type="checkbox" />
            </div>
            <div class="toggle-group">
              <label>Appointment Reminders</label>
              <input type="checkbox" checked />
            </div>
            <div class="toggle-group">
              <label>Patient Updates</label>
              <input type="checkbox" checked />
            </div>
          </div>

          <div class="settings-panel">
            <h3>System Settings</h3>
            <div class="form-group">
              <label>Date Format</label>
              <select>
                <option>MM/DD/YYYY</option>
                <option>DD/MM/YYYY</option>
                <option>YYYY-MM-DD</option>
              </select>
            </div>
            <div class="form-group">
              <label>Time Zone</label>
              <select>
                <option>UTC-5 (Eastern)</option>
                <option>UTC-6 (Central)</option>
                <option>UTC-7 (Mountain)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Currency</label>
              <select>
                <option>USD ($)</option>
                <option>EUR (€)</option>
                <option>GBP (£)</option>
              </select>
            </div>
          </div>
        </section>

        <div class="settings-actions">
          <button class="btn primary">Save Changes</button>
          <button class="btn secondary">Cancel</button>
        </div>
      </main>
    </div>

    <script src="assets/js/settings.js"></script>
  </body>
</html>
